# hyprlock.conf — gruvbox dark theme

$font = JetBrainsMono Nerd Font

# Gruvbox dark palette
$bg       = rgba(40, 40, 40, 0.85)   # #282828
$bg1      = rgba(60, 56, 54, 0.90)   # #3c3836
$fg       = rgba(235, 219, 178, 1.0) # #ebdbb2
$fg4      = rgba(168, 153, 132, 1.0) # #a89984
$yellow   = rgba(250, 189, 47, 1.0)  # #fabd2f
$orange   = rgba(254, 128, 25, 1.0)  # #fe8019
$red      = rgba(251, 73, 52, 1.0)   # #fb4934
$green    = rgba(184, 187, 38, 1.0)  # #b8bb26
$aqua     = rgba(142, 192, 124, 1.0) # #8ec07c

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = fadeIn, 1, 4, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    inner_color = rgba(60, 56, 54, 0.80)
    outer_color = rgba(168, 153, 132, 0.8)
    check_color = rgba(184, 187, 38, 0.9) rgba(142, 192, 124, 0.9) 45deg
    fail_color = rgba(251, 73, 52, 0.9) rgba(254, 128, 25, 0.9) 45deg
    font_color = rgb(235, 219, 178)
    fade_on_empty = true
    rounding = 8
    font_family = $font
    placeholder_text = <span foreground="##a89984">󰍁  password</span>
    fail_text = <span foreground="##fb4934">$PAMFAIL</span>
    dots_spacing = 0.3
    dots_size = 0.35
    position = 0, 100
    halign = center
    valign = bottom
}

# USER
label {
    monitor =
    text =   $USER
    color = rgba(250, 189, 47, 1.0)
    font_size = 16
    font_family = $font

    position = 0, 165
    halign = center
    valign = bottom
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(235, 219, 178, 1.0)
    font_size = 80
    font_family = $font

    position = 0, -60
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"  %A, %d %B %Y"
    color = rgba(168, 153, 132, 1.0)
    font_size = 20
    font_family = $font

    position = 0, -165
    halign = center
    valign = top
}
